<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKE 盤中監控系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: "微軟正黑體", sans-serif; }
        .btn-blue { background-color: #1f6feb; border: 1px solid #388bfd; }
        .btn-cyan { background-color: #0891b2; border: 1px solid #22d3ee; }
        .btn-dark { background-color: #161b22; border: 1px solid #30363d; }
        .btn-debug { background-color: #9a6700; border: 1px solid #d29922; color: #f0e042; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; table-layout: fixed; }
        th { background-color: #161b22; padding: 12px; border: 1px solid #30363d; font-size: 14px; }
        td { padding: 10px; border: 1px solid #30363d; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .row-even { background-color: #11161d; } /* 斑馬紋 */
        
        /* 欄位寬度權重優化 */
        .col-code { width: 70px; }
        .col-name { width: 100px; }
        .col-broker { width: 200px; } /* 寬大戶欄位 */
        
        /* 乖離率顏色邏輯 */
        .bias-green { color: #3fb950; font-weight: bold; }  /* <= 3% */
        .bias-orange { color: #d29922; font-weight: bold; } /* 3-10% */
        .bias-red { color: #f85149; font-weight: bold; }    /* > 10% */
    </style>
</head>
<body class="p-6">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">IKE 盤中監控系統</h1>
        <div class="flex items-center gap-4">
            <select class="btn-dark p-2 rounded text-sm"><option>即時報告</option></select>
            <span class="text-xs text-gray-500" id="update-time">最後更新：----/--/-- --:--:--</span>
        </div>
    </div>

    <div class="flex flex-wrap gap-3 mb-8">
        <button onclick="filterByBias(3)" class="btn-cyan px-4 py-2 rounded-md text-sm">買點篩選 (<=3%)</button>
        <button onclick="filterByNet(1000)" class="btn-blue px-4 py-2 rounded-md text-sm">主力重倉 (>1000張)</button>
        <div class="flex-grow"></div>
        <button onclick="debugForceShow()" class="btn-debug px-4 py-2 rounded-md text-sm">DEBUG 強制顯示</button>
    </div>

    <div id="status-message" class="text-center py-20 text-gray-400">
        目前此時段無符合標的
        <p class="text-xs mt-2">請確認 docs/data.json 是否已產出並上傳至 GitHub。</p>
    </div>

    <table id="data-table" class="hidden">
        <thead>
            <tr>
                <th class="col-code">代碼</th>
                <th class="col-name">名稱</th>
                <th class="col-broker">大戶分點</th>
                <th>買超(張)</th>
                <th>區間均價</th>
                <th>現價</th>
                <th>乖離率</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        let allData = [];

        // 🌟 1. 抓取更正後的路徑
        async function loadData() {
            try {
                // 更正路徑為 ./docs/data.json
                const res = await fetch('./docs/data.json');
                if (!res.ok) throw new Error('找不到 docs/data.json');
                allData = await res.json();
                document.getElementById('update-time').innerText = `最後更新：${new Date().toLocaleString()}`;
            } catch (err) {
                console.error("讀取失敗:", err);
                document.getElementById('status-message').innerHTML += `<br><span class="text-red-500">錯誤: ${err.message}</span>`;
            }
        }

        // 🌟 2. 渲染邏輯 (含顏色與斑馬紋)
        function renderTable(dataList) {
            const table = document.getElementById('data-table');
            const body = document.getElementById('table-body');
            const msg = document.getElementById('status-message');

            if (!dataList || dataList.length === 0) {
                table.classList.add('hidden');
                msg.classList.remove('hidden');
                return;
            }

            msg.classList.add('hidden');
            table.classList.remove('hidden');
            body.innerHTML = '';

            dataList.forEach((item, index) => {
                const biasNum = parseFloat(item.乖離率) || 0;
                let biasClass = 'bias-green';
                if (biasNum > 10) biasClass = 'bias-red';
                else if (biasNum > 3) biasClass = 'bias-orange';

                const row = `
                    <tr class="${index % 2 === 0 ? 'row-even' : ''}">
                        <td class="col-code">${item.代碼}</td>
                        <td class="col-name text-cyan-400 font-bold">${item.名稱}</td>
                        <td class="col-broker text-left text-xs">${item.大戶 || item.大戶名稱}</td>
                        <td>${item.淨超 || item.買進張數 || 0}</td>
                        <td>${item.均價 || '--'}</td>
                        <td class="font-mono text-yellow-500">${item.現價 || 0}</td>
                        <td class="${biasClass}">${item.乖離率 || '0%'}</td>
                    </tr>
                `;
                body.innerHTML += row;
            });
        }

        function filterByBias(limit) {
            const filtered = allData.filter(d => parseFloat(d.乖離率) <= limit);
            renderTable(filtered);
        }

        function filterByNet(limit) {
            const filtered = allData.filter(d => (d.淨超 || d.買進張數) > limit);
            renderTable(filtered);
        }

        function debugForceShow() {
            renderTable(allData);
        }

        window.onload = loadData;
    </script>
</body>
</html>
