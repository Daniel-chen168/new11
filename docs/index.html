<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKE 盤中監控 - 手機優化版</title>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: "微軟正黑體", sans-serif; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th { background-color: #161b22; padding: 10px 4px; border: 1px solid #30363d; font-size: 12px; color: #8b949e; }
        td { padding: 12px 4px; border: 1px solid #30363d; text-align: center; font-size: 14px; }
        .table-recommend th { background-color: #3d2a00; border-color: #d29922; color: #e3b341; }
        .table-recommend td { border-color: #d29922; background-color: #1a1405; }
        .text-up { color: #f85149; font-weight: bold; }
        
        /* 手機版隱藏非核心欄位，改用展開顯示 */
        @media (max-width: 768px) {
            .hide-mobile { display: none; }
            .col-code { width: 70px; }
            .col-name { width: 90px; }
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="flex justify-between items-center mb-4">
        <div>
            <h1 class="text-xl font-bold">IKE 盤中監控</h1>
            <div class="text-[10px] text-gray-500">
                今日點閱：<span id="busuanzi_value_site_pv">--</span> | 訪客：<span id="busuanzi_value_site_uv">--</span>
            </div>
        </div>
        <span class="text-[10px] text-gray-400" id="update-time">最後更新：讀取中...</span>
    </div>

    <div id="recommendation-section" class="mb-6 hidden overflow-x-auto">
        <h2 class="text-md font-bold text-yellow-500 mb-1">🌟 當日印象派推薦 <span class="text-[10px] font-normal text-gray-500">(點擊查看細節)</span></h2>
        <table class="table-recommend">
            <thead>
                <tr>
                    <th class="col-code">代碼</th>
                    <th class="col-name">名稱</th>
                    <th class="hide-mobile">期間</th>
                    <th>現價</th>
                    <th>漲跌幅</th>
                    <th class="hide-mobile">成交量</th>
                    <th class="hide-mobile">狀態</th>
                </tr>
            </thead>
            <tbody id="recommend-body"></tbody>
        </table>
    </div>

    <h2 class="text-md font-bold text-cyan-400 mb-1">📊 監控雷達</h2>
    <div class="overflow-x-auto">
        <table id="main-table">
            <thead>
                <tr>
                    <th class="col-code">代碼</th>
                    <th class="col-name">名稱</th>
                    <th class="hide-mobile">上升觀察日</th>
                    <th>現價</th>
                    <th>漲跌幅</th>
                    <th class="hide-mobile">成交量</th>
                    <th class="hide-mobile">狀態</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        let primaryData = [], recommendData = [];

        async function loadData() {
            try {
                const res = await fetch(`./data.json?t=${new Date().getTime()}`);
                const json = await res.json();
                document.getElementById('update-time').innerText = json.last_update || "";
                if (json.history) {
                    primaryData = json.history[0].primary_list || [];
                    recommendData = json.history[0].secondary_list || [];
                }
                renderTable('recommend-body', sortLogic(recommendData), true);
                renderTable('table-body', sortLogic(primaryData), false);
                if(recommendData.length > 0) document.getElementById('recommendation-section').classList.remove('hidden');
            } catch (e) { console.error(e); }
        }

        function sortLogic(data) {
            const weights = { "當日": 1, "1日": 2, "2日": 3 };
            return data.sort((a, b) => {
                const wA = weights[a.期間 || a.觀察點日期] || 99;
                const wB = weights[b.期間 || b.觀察點日期] || 99;
                if (wA !== wB) return wA - wB;
                return (parseFloat(String(b.成交量).replace(/,/g, '')) || 0) - (parseFloat(String(a.成交量).replace(/,/g, '')) || 0);
            });
        }

        function renderTable(targetId, list, isRec) {
            const tbody = document.getElementById(targetId);
            tbody.innerHTML = list.map((item, i) => {
                const id = `detail-${targetId}-${i}`;
                const pct = item.漲跌幅百分比 || item.漲跌幅 || "0%";
                const vol = item.成交量 ? String(item.成交量).replace(/\B(?=(\d{3})+(?!\d))/g, ",") : "--";
                
                return `
                    <tr class="${i % 2 === 0 ? 'row-even' : ''}" onclick="document.getElementById('${id}').classList.toggle('hidden')">
                        <td class="text-blue-400 font-mono text-xs">${item.代碼}</td>
                        <td class="text-blue-200 font-bold text-xs">${item.名稱}</td>
                        <td class="hide-mobile text-gray-400 text-xs">${item.期間 || item.觀察點日期 || '--'}</td>
                        <td class="text-yellow-500 font-mono">${item.最新價格 || item.現價}</td>
                        <td class="${parseFloat(pct) > 0 ? 'text-up' : ''}">${pct}</td>
                        <td class="hide-mobile text-right text-gray-300 font-mono">${vol}</td>
                        <td class="hide-mobile text-xs ${item.布林通道狀態?.includes('起漲') ? 'text-cyan-400' : 'text-gray-400'}">${item.布林通道狀態 || item.狀態 || '--'}</td>
                    </tr>
                    <tr id="${id}" class="hidden bg-slate-900 md:hidden">
                        <td colspan="4" class="p-3 text-left text-xs space-y-1">
                            <div class="text-orange-400 font-bold">期間/日期: ${item.期間 || item.觀察點日期 || '--'}</div>
                            <div class="text-gray-300">成交量: <span class="text-white">${vol}</span></div>
                            <div class="text-gray-300">狀態: <span class="${item.布林通道狀態?.includes('起漲') ? 'text-cyan-400' : 'text-gray-400'}">${item.布林通道狀態 || item.狀態 || '--'}</span></div>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        window.onload = loadData;
    </script>
</body>
</html>
