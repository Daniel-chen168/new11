name: IKE_TOOL Scheduled Analysis

on:
  schedule:
    # 台北時間 09:30, 10:30, 11:30, 12:30 (週一至週五)
    - cron: '30 1,2,3,4 * * 1-5'
    # 台北時間 13:00 (週一至週五)
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 根據 main.py 的需求安裝套件
          pip install yfinance shioaji pandas requests pytz loguru
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run IKE_TOOL
        run: |
          # 確保 Python 能抓到同目錄下的 stock_analyzer.py 等模組
          export PYTHONPATH=$PYTHONPATH:.
          python main.py

      - name: Commit and Push data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # ★ 重要修正：你的程式產出在 docs/data.json，所以要 add 這個路徑
          if [ -f "docs/data.json" ]; then
            git add docs/data.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update data.json: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
          else
            echo "錯誤：找不到 docs/data.json，請檢查程式執行 Log"
            exit 1
          fi
