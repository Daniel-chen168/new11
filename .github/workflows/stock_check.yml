name: IKE_TOOL Scheduled Analysis

on:
  schedule:
    # 台北時間 (CST) 週一至週五：09:30, 10:30, 11:30, 12:30
    # 對應 UTC 時間：01:30, 02:30, 03:30, 04:30
    - cron: '30 1,2,3,4 * * 1-5'
    
    # 台北時間 (CST) 週一至週五：13:00
    # 對應 UTC 時間：05:00
    - cron: '0 5 * * 1-5'
  
  # 允許從 GitHub Actions 頁面手動點擊 "Run workflow" 進行測試
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    
    # ★ 修正重點 1：設定逾時時間為 60 分鐘
    # 由於加入了隨機延遲以避開 Yahoo Finance 封鎖，程式執行時間會拉長，需給予足夠緩衝
    timeout-minutes: 60

    # 授予寫入權限，讓 Action 能夠更新並推送 docs/data.json 回儲存庫
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 根據 main.py 的需求安裝必要套件
          pip install yfinance shioaji pandas requests pytz loguru pyarrow
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run IKE_TOOL
        run: |
          # 增加 PYTHONPATH 確保能導入同目錄下的 data_downloader.py 等模組
          export PYTHONPATH=$PYTHONPATH:.
          # 執行主程式
          python main.py

      - name: Commit and Push data.json
        run: |
          # 設定 GitHub Actions Bot 身分
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # ★ 修正重點 2：對應 main.py 的產出路徑 docs/data.json
          if [ -f "docs/data.json" ]; then
            git add docs/data.json
            # 只有在內容有變動時才 commit，避免無意義的推送
            git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update data.json: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
          else
            echo "Error: docs/data.json not found! 程式可能執行失敗或路徑不正確。"
            exit 1
          fi
