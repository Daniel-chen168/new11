name: IKE_TOOL Scheduled Analysis

on:
  schedule:
    # 稍微偏移分鐘數 (30 -> 37, 00 -> 07) 以減少排隊時間
    # 台北 09:37, 10:37, 11:37, 12:37 (UTC 01:37, 02:37, 03:37, 04:37)
    - cron: '37 1,2,3,4 * * 1-5'
    
    # 台北 13:07 (UTC 05:07)
    - cron: '7 5 * * 1-5'
  
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 60 
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 確保 pull --rebase 有完整的歷史紀錄

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 確保包含所有 main.py 所需套件
          pip install yfinance shioaji pandas requests pytz loguru pyarrow
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run IKE_TOOL
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python main.py

      - name: Commit and Push data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 檢查 main.py 產出的路徑
          if [ -f "docs/data.json" ]; then
            git add docs/data.json
            
            # 只有在內容有變動時才 commit
            if ! git diff --quiet --staged; then
              git commit -m "Auto-update data.json: $(date +'%Y-%m-%d %H:%M:%S')"
              
              # 解決 [rejected] 問題的關鍵：先 rebase 再 push
              git pull --rebase origin main
              git push origin main
            else
              echo "No changes in data.json, skipping push."
            fi
          else
            echo "Error: docs/data.json not found!"
            exit 1
          fi
