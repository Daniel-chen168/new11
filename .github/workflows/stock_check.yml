name: IKE_TOOL Scheduled Analysis

on:
  schedule:
    # 台北時間 (CST) 週一至週五：09:30, 10:30, 11:30, 12:30
    # 對應 UTC 時間：01:30, 02:30, 03:30, 04:30
    - cron: '30 1,2,3,4 * * 1-5'
    
    # 台北時間 (CST) 週一至週五：13:00
    # 對應 UTC 時間：05:00
    - cron: '0 5 * * 1-5'
  
  workflow_dispatch: # 允許手動點擊 Run workflow 測試

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    
    # 授予寫入權限，讓 Action 能夠更新 data.json
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 自動安裝你專案所需的全部核心套件
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found, installing core packages..."
            pip install yfinance shioaji pandas requests loguru
          fi

      - name: Run IKE_TOOL
        run: |
          # 確保 Python 能正確導入同目錄下的 data_downloader.py 等模組
          export PYTHONPATH=$PYTHONPATH:.
          python main.py

      - name: Commit and Push data.json
        run: |
          # 設定 GitHub Actions Bot 身分
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 檢查 data.json 是否產出，並在有變動時推送到 GitHub
          if [ -f "data.json" ]; then
            git add data.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update data.json: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
          else
            echo "Error: data.json was not found after execution."
            exit 1
          fi
